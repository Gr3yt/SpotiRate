<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpotiRater</title>
<link rel="icon" type="image/png" href="/images/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Album Rater</h1>
  <span id="token-status">CONNECTING...</span>
</header>

<main>
  <div id="setup-panel">
    <div class="panel-label">Search</div>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search for an album or single..." onkeydown="if(event.key==='Enter')searchAlbum()">
      <button onclick="searchAlbum()" id="search-btn">SEARCH</button>
    </div>
    <div id="results-list"></div>
    <div id="status-msg"></div>
  </div>

  <div id="rater-panel">
    <div class="album-header fade-in" id="album-header"></div>
    <div class="track-list fade-in" id="track-list"></div>
    <div class="actions">
      <button onclick="generateCard()">GENERATE CARD</button>
      <button class="secondary" onclick="resetAll()">← SEARCH AGAIN</button>
    </div>
  </div>

  <div id="card-wrapper">
    <div class="section-label">Your Rating Card</div>
    <div id="export-card"></div>
    <div class="card-actions">
      <button onclick="downloadCard(event)">DOWNLOAD IMAGE</button>
      <button class="secondary" onclick="document.getElementById('card-wrapper').style.display='none'">HIDE</button>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
